<style>
:root {
  --cream: #faf8f3;
  --parchment: #f0ead8;
  --gold: #b8964a;
  --gold-light: #d4ae6a;
  --dark: #2c2416;
  --medium: #5a4a2e;
  --olive: #6b7c4e;
  --rose: #a05060;
  --blue-gray: #4a6070;
  --shadow: rgba(44,36,22,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Lato', sans-serif;
  background: var(--cream);
  color: var(--dark);
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: var(--dark);
  color: var(--cream);
  padding: 20px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px var(--shadow);
}
header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--gold-light);
}
header p {
  font-size: 11px;
  color: #a09070;
  margin-top: 2px;
}
.header-actions { display: flex; gap: 10px; }
.btn {
  padding: 8px 16px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-family: 'Lato', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .5px;
  transition: all .2s;
}
.btn-gold { background: var(--gold); color: white; }
.btn-gold:hover { background: var(--gold-light); }
.btn-outline { background: transparent; color: var(--gold-light); border: 1.5px solid var(--gold); }
.btn-outline:hover { background: var(--gold); color: white; }

/* ── MAIN CANVAS ── */
#tree-canvas {
  padding: 30px 20px 80px;
  overflow-x: auto;
  min-height: calc(100vh - 80px);
}

/* ── GENERATION ROW ── */
.gen-row {
  display: flex;
  flex-direction: row;
  justify-content: center;
  align-items: flex-start;
  gap: 24px;
  flex-wrap: wrap;
  position: relative;
  margin-bottom: 0;
}

.gen-label {
  text-align: center;
  font-size: 10px;
  color: var(--gold);
  letter-spacing: .12em;
  text-transform: uppercase;
  font-weight: 700;
  margin: 20px 0 8px;
  position: relative;
}
.gen-label::before, .gen-label::after {
  content: '——';
  margin: 0 8px;
  opacity: .4;
}

/* ── CONNECTOR LINES ── */
.connector-down {
  display: flex;
  justify-content: center;
  margin: 4px 0;
}
.connector-down svg { display: block; }

/* ── PERSON CARD ── */
.family-unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.couple-row {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  gap: 4px;
}

.plus-sign {
  font-size: 20px;
  color: var(--rose);
  font-weight: 300;
  padding-top: 14px;
  line-height: 1;
  flex-shrink: 0;
}

.person-card {
  width: 155px;
  background: white;
  border-radius: 10px;
  padding: 10px 12px;
  border: 1.5px solid #ddd4bb;
  box-shadow: 0 2px 8px var(--shadow);
  cursor: pointer;
  transition: all .2s;
  position: relative;
}
.person-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 18px var(--shadow);
  border-color: var(--gold);
}
.person-card.direct {
  border-color: var(--olive);
  border-width: 2px;
  background: #f6f9f0;
}
.person-card.spouse {
  border-color: var(--rose);
  background: #fdf5f7;
}
.person-card.intestado {
  border-color: #c4803a;
  background: #fdf8f0;
}
.person-card.unknown {
  border-color: #ccc;
  border-style: dashed;
  background: #f8f8f8;
}
.person-card.you {
  border-color: var(--blue-gray);
  border-width: 2.5px;
  background: #f0f4f8;
}

.card-name-es {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--dark);
  line-height: 1.3;
}
.card-name-gr {
  font-size: 9.5px;
  color: var(--medium);
  font-style: italic;
  line-height: 1.3;
  margin-top: 1px;
}
.card-dates {
  font-size: 9px;
  color: #888;
  line-height: 1.4;
  margin-top: 3px;
  border-top: 1px solid #eee;
  padding-top: 3px;
}
.card-badge {
  display: inline-block;
  font-size: 8px;
  padding: 1px 5px;
  border-radius: 10px;
  font-weight: 700;
  letter-spacing: .3px;
  margin-bottom: 3px;
}
.badge-direct { background: var(--olive); color: white; }
.badge-intestado { background: #c4803a; color: white; }
.badge-you { background: var(--blue-gray); color: white; }

/* ── ADD BUTTONS ── */
.add-buttons {
  display: flex;
  gap: 4px;
  margin-top: 4px;
  justify-content: center;
}
.add-btn {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid var(--gold);
  background: transparent;
  color: var(--gold);
  cursor: pointer;
  font-family: 'Lato', sans-serif;
  font-weight: 700;
  transition: all .15s;
  white-space: nowrap;
}
.add-btn:hover { background: var(--gold); color: white; }
.add-btn.add-spouse { border-color: var(--rose); color: var(--rose); }
.add-btn.add-spouse:hover { background: var(--rose); color: white; }
.add-btn.add-child { border-color: var(--olive); color: var(--olive); }
.add-btn.add-child:hover { background: var(--olive); color: white; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(44,36,22,.6);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(3px);
}
.modal {
  background: white;
  border-radius: 14px;
  padding: 28px 32px;
  width: 420px;
  max-width: 95vw;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
  position: relative;
}
.modal h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  color: var(--dark);
  margin-bottom: 18px;
  border-bottom: 1px solid var(--parchment);
  padding-bottom: 10px;
}
.modal label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--medium);
  letter-spacing: .05em;
  text-transform: uppercase;
  margin-bottom: 4px;
  margin-top: 12px;
}
.modal input, .modal select {
  width: 100%;
  padding: 9px 12px;
  border: 1.5px solid #ddd;
  border-radius: 7px;
  font-family: 'Lato', sans-serif;
  font-size: 13px;
  color: var(--dark);
  background: var(--cream);
  transition: border .15s;
}
.modal input:focus, .modal select:focus {
  outline: none;
  border-color: var(--gold);
}
.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 20px;
}
.btn-cancel {
  padding: 9px 18px;
  border-radius: 7px;
  border: 1.5px solid #ddd;
  background: white;
  cursor: pointer;
  font-family: 'Lato', sans-serif;
  font-size: 12px;
  color: #888;
}
.btn-cancel:hover { border-color: #aaa; }
.btn-save {
  padding: 9px 22px;
  border-radius: 7px;
  border: none;
  background: var(--gold);
  color: white;
  cursor: pointer;
  font-family: 'Lato', sans-serif;
  font-size: 12px;
  font-weight: 700;
}
.btn-save:hover { background: var(--gold-light); }
.close-modal {
  position: absolute;
  top: 14px; right: 16px;
  background: none;
  border: none;
  font-size: 20px;
  color: #aaa;
  cursor: pointer;
  line-height: 1;
}
.close-modal:hover { color: var(--dark); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--dark);
  color: var(--cream);
  padding: 10px 22px;
  border-radius: 8px;
  font-size: 13px;
  z-index: 2000;
  transition: transform .3s;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── LEGEND ── */
.legend {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 14px 20px;
  background: var(--parchment);
  border-top: 1px solid #ddd4bb;
  font-size: 10px;
  color: var(--medium);
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot {
  width: 12px; height: 12px;
  border-radius: 3px;
  flex-shrink: 0;
}

    <div class="modal-actions">

</div>

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let treeData = loadFromStorage();
let modalCallback = null;

function loadFromStorage() {
  try {
    const saved = localStorage.getItem('aretos-tree');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveToStorage() {
  try {
    localStorage.setItem('aretos-tree', JSON.stringify(treeData));
    showToast('Árbol guardado en este navegador ✓');
  } catch(e) {
    showToast('Error al guardar');
  }
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(treeData, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'arbol-aretos.json';
  a.click();
  showToast('Datos exportados como JSON ✓');
}

// ═══════════════════════════════════════════
function genId() {
  return 'p-' + Math.random().toString(36).slice(2,9);
}

// ═══════════════════════════════════════════
// FIND + UPDATE helpers
// ═══════════════════════════════════════════
function findNode(data, id) {
  if (data.id === id) return data;
  if (data.spouse && data.spouse.id === id) return data.spouse;
  if (data.children) {
    for (const c of data.children) {
      const f = findNode(c, id);
      if (f) return f;
    }
  }
  return null;
}

function findParent(data, id, parent=null) {
  if (data.id === id) return parent;
  if (data.children) {
    for (const c of data.children) {
      const f = findParent(c, id, data);
      if (f !== undefined) return f;
    }
  }
  return undefined;
}

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
function openModal(title, defaults, callback) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('f-name-es').value = defaults.nameEs || '';
  document.getElementById('f-name-gr').value = defaults.nameGr || '';
  document.getElementById('f-birth').value = defaults.birth || '';
  document.getElementById('f-place').value = defaults.place || '';
  document.getElementById('f-death').value = defaults.death || '';
  document.getElementById('f-notes').value = defaults.notes || '';
  document.getElementById('modal').style.display = 'flex';
  modalCallback = callback;
  setTimeout(() => document.getElementById('f-name-es').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  modalCallback = null;
}

function saveModal() {
  const data = {
    nameEs: document.getElementById('f-name-es').value.trim(),
    nameGr: document.getElementById('f-name-gr').value.trim(),
    birth:  document.getElementById('f-birth').value.trim(),
    place:  document.getElementById('f-place').value.trim(),
    death:  document.getElementById('f-death').value.trim(),
    notes:  document.getElementById('f-notes').value.trim(),
  };
  if (!data.nameEs) { alert('El nombre es obligatorio'); return; }
  if (modalCallback) modalCallback(data);
  closeModal();
  renderTree();
  saveToStorage();
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function editPerson(id) {
  const node = findNode(treeData, id);
  if (!node) return;
  openModal('Editar persona', node, (data) => {
    Object.assign(node, data);
    showToast('Persona actualizada ✓');
  });
}

function addSpouse(personId) {
  const node = findNode(treeData, personId);
  if (!node) return;
  if (node.spouse) {
    showToast('Esta persona ya tiene cónyuge registrado. Edítalo haciendo clic en su tarjeta.');
    return;
  }
  openModal('Agregar cónyuge / esposo(a)', {}, (data) => {
    node.spouse = { id: genId(), ...data, type: 'spouse', children: undefined };
    showToast('Cónyuge agregado ✓');
  });
}

function addChild(parentId) {
  const parent = findNode(treeData, parentId);
  if (!parent) return;
  if (!parent.children) parent.children = [];
  openModal('Agregar hijo/a', {}, (data) => {
    parent.children.push({
      id: genId(), ...data, type: 'direct', children: []
    });
    showToast('Hijo/a agregado ✓');
  });
}

function deletePerson(id) {
  if (id === 'root') { showToast('No se puede eliminar la raíz del árbol'); return; }
  if (!confirm('¿Eliminar esta persona y todos sus descendientes?')) return;
  const parent = findParent(treeData, id);
  if (parent && parent.children) {
    parent.children = parent.children.filter(c => c.id !== id);
    if (parent.spouse && parent.spouse.id === id) parent.spouse = undefined;
  }
  renderTree();
  saveToStorage();
  showToast('Persona eliminada');
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function renderTree() {
  const root = document.getElementById('tree-root');
  root.innerHTML = '';
  root.appendChild(renderNode(treeData, 0));
}

function renderNode(node, depth) {
  const section = document.createElement('div');
  section.className = 'gen-row-wrap';

  // Generation label
  const genLabels = ['Generación 1 · Bisabuelos griegos', 'Generación 2 · Los 6 hijos', 'Generación 3 · Bisabuelo en México', 'Generación 4 · Hijos del bisabuelo', 'Generación 5 · Abuelos', 'Generación 6 · Tus tíos y mamá', 'Generación 7 · Tu generación'];
  if (depth === 0) {
    const lbl = document.createElement('p');
    lbl.className = 'gen-label';
    lbl.textContent = genLabels[0] || `Generación ${depth+1}`;
    section.appendChild(lbl);
  }

  // Row with this node + siblings (handled by parent)
  // We render this node as a family unit
  const unit = makeFamilyUnit(node, depth);
  section.appendChild(unit);

  // Children row
  if (node.children && node.children.length > 0) {
    // Connector down
    const connDown = document.createElement('div');
    connDown.className = 'connector-down';
    connDown.innerHTML = `<svg width="2" height="30"><line x1="1" y1="0" x2="1" y2="30" stroke="#b8964a" stroke-width="2"/></svg>`;
    section.appendChild(connDown);

    // Children label
    const childLabel = document.createElement('p');
    childLabel.className = 'gen-label';
    childLabel.textContent = genLabels[depth+1] || `Generación ${depth+2}`;
    section.appendChild(childLabel);

    // Children in a row
    const childRow = document.createElement('div');
    childRow.className = 'gen-row';
    childRow.style.cssText = 'gap:20px;';

    node.children.forEach((child, i) => {
      const childWrap = document.createElement('div');
      childWrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;';

      const childUnit = makeFamilyUnit(child, depth+1);
      childWrap.appendChild(childUnit);

      // Grandchildren
      if (child.children && child.children.length > 0) {
        const gc = document.createElement('div');
        gc.style.cssText = 'display:flex;flex-direction:column;align-items:center;width:100%;';

        const gcLine = document.createElement('div');
        gcLine.className = 'connector-down';
        gcLine.innerHTML = `<svg width="2" height="24"><line x1="1" y1="0" x2="1" y2="24" stroke="#b8964a" stroke-width="2"/></svg>`;
        gc.appendChild(gcLine);

        const gcLabel = document.createElement('p');
        gcLabel.className = 'gen-label';
        gcLabel.style.fontSize = '9px';
        gcLabel.textContent = genLabels[depth+2] || `Generación ${depth+3}`;
        gc.appendChild(gcLabel);

        const gcRow = document.createElement('div');
        gcRow.className = 'gen-row';
        gcRow.style.cssText = 'gap:14px;';

        child.children.forEach(gc_child => {
          const gcUnit = makeFamilyUnit(gc_child, depth+2);

          // Great-grandchildren
          if (gc_child.children && gc_child.children.length > 0) {
            const ggWrap = document.createElement('div');
            ggWrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;';
            ggWrap.appendChild(gcUnit);

            const ggLine = document.createElement('div');
            ggLine.className = 'connector-down';
            ggLine.innerHTML = `<svg width="2" height="20"><line x1="1" y1="0" x2="1" y2="20" stroke="#b8964a" stroke-width="2"/></svg>`;
            ggWrap.appendChild(ggLine);

            const ggLabel = document.createElement('p');
            ggLabel.className = 'gen-label';
            ggLabel.style.fontSize = '9px';
            ggLabel.textContent = genLabels[depth+3] || `Generación ${depth+4}`;
            ggWrap.appendChild(ggLabel);

            const ggRow = document.createElement('div');
            ggRow.className = 'gen-row';
            ggRow.style.cssText = 'gap:10px;';

            gc_child.children.forEach(gg => {
              const ggUnit = makeFamilyUnit(gg, depth+3);

              // 5th level
              if (gg.children && gg.children.length > 0) {
                const g5Wrap = document.createElement('div');
                g5Wrap.style.cssText='display:flex;flex-direction:column;align-items:center;';
                g5Wrap.appendChild(ggUnit);
                const g5Line = document.createElement('div');
                g5Line.className='connector-down';
                g5Line.innerHTML=`<svg width="2" height="20"><line x1="1" y1="0" x2="1" y2="20" stroke="#b8964a" stroke-width="2"/></svg>`;
                g5Wrap.appendChild(g5Line);
                const g5Row = document.createElement('div');
                g5Row.className='gen-row';
                g5Row.style.cssText='gap:10px;';
                gg.children.forEach(g5 => g5Row.appendChild(makeFamilyUnit(g5, depth+4)));
                g5Wrap.appendChild(g5Row);
                ggRow.appendChild(g5Wrap);
              } else {
                ggRow.appendChild(ggUnit);
              }
            });

            ggWrap.appendChild(ggRow);
            gcRow.appendChild(ggWrap);
          } else {
            gcRow.appendChild(gcUnit);
          }
        });

        gc.appendChild(gcRow);
        childWrap.appendChild(gc);
      }

      childRow.appendChild(childWrap);
    });

    section.appendChild(childRow);
  }

  return section;
}

function makeFamilyUnit(node, depth) {
  const unit = document.createElement('div');
  unit.className = 'family-unit';

  const coupleRow = document.createElement('div');
  coupleRow.className = 'couple-row';

  // Main person card
  coupleRow.appendChild(makeCard(node, depth));

  // Spouse
  if (node.spouse) {
    const plus = document.createElement('span');
    plus.className = 'plus-sign';
    plus.textContent = '+';
    coupleRow.appendChild(plus);
    coupleRow.appendChild(makeCard(node.spouse, depth));
  }

  unit.appendChild(coupleRow);

  // Action buttons
  const btns = document.createElement('div');
  btns.className = 'add-buttons';

  if (!node.spouse) {
    const spouseBtn = document.createElement('button');
    spouseBtn.className = 'add-btn add-spouse';
    spouseBtn.textContent = '+ Cónyuge';
    spouseBtn.onclick = (e) => { e.stopPropagation(); addSpouse(node.id); };
    btns.appendChild(spouseBtn);
  }

  const childBtn = document.createElement('button');
  childBtn.className = 'add-btn add-child';
  childBtn.textContent = '+ Hijo/a';
  childBtn.onclick = (e) => { e.stopPropagation(); addChild(node.id); };
  btns.appendChild(childBtn);

  unit.appendChild(btns);

  return unit;
}

function makeCard(node, depth) {
  const card = document.createElement('div');
  card.className = `person-card ${node.type || 'other'}`;
  card.title = 'Clic para editar';

  let badge = '';
  if (node.type === 'direct') badge = `<span class="card-badge badge-direct">Línea directa ★</span><br>`;
  if (node.type === 'intestado') badge = `<span class="card-badge badge-intestado">Intestado ⚖️</span><br>`;
  if (node.type === 'you') badge = `<span class="card-badge badge-you">Tú ★</span><br>`;

  const deathStr = node.death ? `<br>†${node.death}` : '';
  const notesStr = node.notes ? `<br><em>${node.notes}</em>` : '';

  card.innerHTML = `
    ${badge}
    <div class="card-name-es">${node.nameEs || '?'}</div>
    ${node.nameGr ? `<div class="card-name-gr">${node.nameGr}</div>` : ''}
    <div class="card-dates">${node.birth || ''}${node.place && node.birth ? '' : node.place || ''}${deathStr}${notesStr}</div>
  `;

  card.onclick = () => editPerson(node.id);

  return card;
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderTree();

// Auto-save every 30 seconds
setInterval(saveToStorage, 30000);
</script>
</body>
</html>
